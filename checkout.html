<!DOCTYPE html>
<html lang="en">
<head>
<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-5 shadow">

        <h2 class="text-center mb-4">💳 Checkout</h2>

        <form onsubmit="done(); return false;">

            <input class="form-control mb-3" placeholder="Full Name" required>
            <input class="form-control mb-3" placeholder="Address" required>

            <!-- PAYMENT OPTIONS -->
            <h5 class="mt-3">Select Payment Method</h5>

            <select class="form-control mb-3">
                <option>Cash on Delivery</option>
                <option>UPI</option>
                <option>Credit Card</option>
            </select>

            <button class="btn btn-success w-100">Confirm Order</button>

        </form>

    </div>

</div>

<script>
function done(){
    alert("🎉 Order Confirmed Successfully!");
    localStorage.removeItem("cart");
}
</script>

</body>
</html>
