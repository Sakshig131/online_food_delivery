<!DOCTYPE html>
<html lang="en">
<head>
    <title>Menu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <h1>🍔 Foodie Hub</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart 🛒</a>
    </nav>
</header>

<!-- MENU -->
<section class="container my-5">
    <h2 class="text-center mb-5">🍽️ Our Delicious Menu</h2>

    <div class="row g-4">

        <!-- Burger -->
        <div class="col-md-4">
            <div class="card h-100 shadow">
                <img src="images/burger.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h4>Cheese Burger</h4>
                    <p class="text-success fw-bold">₹120</p>
                    <p class="text-muted">Loaded with cheese & fresh veggies</p>
                    <button class="btn btn-danger w-100"
                        onclick="addToCart('Cheese Burger',120)">
                        🛒 Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <!-- Pizza -->
        <div class="col-md-4">
            <div class="card h-100 shadow">
                <img src="images/pizza.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h4>Veg Pizza</h4>
                    <p class="text-success fw-bold">₹250</p>
                    <p class="text-muted">Crispy base with toppings</p>
                    <button class="btn btn-danger w-100"
                        onclick="addToCart('Veg Pizza',250)">
                        🛒 Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <!-- Pasta -->
        <div class="col-md-4">
            <div class="card h-100 shadow">
                <img src="images/pasta.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h4>White Sauce Pasta</h4>
                    <p class="text-success fw-bold">₹180</p>
                    <p class="text-muted">Creamy & delicious pasta</p>
                    <button class="btn btn-danger w-100"
                        onclick="addToCart('Pasta',180)">
                        🛒 Add to Cart
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Go to Cart Button -->
    <div class="text-center mt-5">
        <a href="cart.html" class="btn btn-success btn-lg">
            Go to Cart 🛒
        </a>
    </div>

</section>

<!-- SCRIPT -->
<script>
function addToCart(name, price) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
        product: name,
        price: price
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart 🛒");
}
</script>

</body>
</html>
